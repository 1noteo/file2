<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Photo Collage</title>
  <meta name="description" content="4枚の写真から2×2の組み写真を作るブラウザアプリ">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <aside class="control-panel">
      <header class="app-header">
        <p class="eyebrow">4-PHOTO COLLAGE</p>
        <h1>4枚の組み写真</h1>
        <p class="lead">4枚の写真を2×2に配置し、余白・間隔・比率を整えて書き出します。</p>
      </header>

      <section class="section">
        <div class="section-title-row"><h2>写真</h2><button id="clearAllButton" class="text-button">すべて解除</button></div>
        <label class="upload-button" for="fileInput">4枚の写真を選択</label>
        <input id="fileInput" type="file" accept="image/*" multiple>
        <div id="photoSlots" class="photo-slots"></div>
        <p class="hint">画像カードをドラッグして順番を変更できます。各カードの「位置」から表示範囲も調整できます。</p>
      </section>

      <section class="section">
        <h2>キャンバス</h2>
        <label class="field"><span>出力比率</span><select id="canvasRatio">
          <option value="1:1">1:1</option><option value="4:5">4:5</option><option value="3:4">3:4</option>
          <option value="3:2">3:2</option><option value="2:3">2:3</option><option value="16:9">16:9</option><option value="9:16">9:16</option>
        </select></label>
        <div class="field"><div class="field-heading"><span>外側の余白</span><output id="outerPaddingValue">80 px</output></div><input id="outerPadding" type="range" min="0" max="500" value="80"></div>
        <div class="field"><div class="field-heading"><span>写真の間隔</span><output id="gapValue">24 px</output></div><input id="gap" type="range" min="0" max="250" value="24"></div>
        <div class="field"><span>背景色</span><div class="color-row"><input id="backgroundColor" type="color" value="#ffffff"><input id="backgroundColorText" type="text" value="#ffffff" maxlength="7"></div></div>
      </section>

      <section class="section">
        <h2>写真の見え方</h2>
        <label class="field"><span>配置方法</span><select id="fitMode"><option value="cover">枠いっぱいに表示</option><option value="contain">写真全体を表示</option></select></label>
        <label class="field check-field"><input id="equalCells" type="checkbox" checked><span>4つのセルを同じ大きさにする</span></label>
        <label class="field check-field"><input id="roundedCorners" type="checkbox"><span>写真の角を丸くする</span></label>
        <div class="field" id="cornerRadiusField" hidden><div class="field-heading"><span>角丸</span><output id="cornerRadiusValue">24 px</output></div><input id="cornerRadius" type="range" min="0" max="120" value="24"></div>
      </section>

      <section class="section">
        <h2>出力</h2>
        <div class="two-column">
          <label class="field"><span>形式</span><select id="exportFormat"><option value="png">PNG</option><option value="jpeg">JPEG</option></select></label>
          <label class="field"><span>長辺</span><select id="exportLongEdge"><option value="2000">2000 px</option><option value="3000">3000 px</option><option value="4000" selected>4000 px</option><option value="6000">6000 px</option><option value="original">最大</option></select></label>
        </div>
        <div class="field" id="jpegQualityField" hidden><div class="field-heading"><span>JPEG品質</span><output id="jpegQualityValue">96</output></div><input id="jpegQuality" type="range" min="60" max="100" value="96"></div>
        <button id="downloadButton" class="primary-button" disabled>組み写真を保存</button>
      </section>
    </aside>

    <section class="preview-panel">
      <div class="preview-toolbar"><div><span class="preview-label">PREVIEW</span><span id="outputInfo" class="output-info">4枚の写真を追加してください</span></div><button id="demoButton" class="secondary-button">デモ画像を入れる</button></div>
      <div id="dropZone" class="preview-stage">
        <div id="emptyState" class="empty-state"><div class="empty-icon">4</div><h2>写真を4枚追加</h2><p>ここへまとめてドラッグ＆ドロップできます。</p></div>
        <canvas id="previewCanvas"></canvas>
      </div>
      <p class="browser-note">画像処理はブラウザ内だけで行われ、写真はサーバーへ送信されません。</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
