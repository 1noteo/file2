<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tools</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont,
        "Hiragino Sans", "Yu Gothic UI", sans-serif;
      padding: 24px;
    }

    main {
      width: min(820px, 100%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .description {
      margin: 0 0 28px;
      color: #aaa;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .tool {
      display: block;
      padding: 28px;
      border-radius: 22px;
      color: inherit;
      text-decoration: none;
      background: #1d1d20;
      border: 1px solid #333;
      transition: transform .15s ease, background .15s ease;
    }

    .tool:hover {
      transform: translateY(-3px);
      background: #252529;
    }

    .tool h2 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .tool p {
      margin: 0;
      color: #aaa;
      line-height: 1.7;
    }

    @media (max-width: 650px) {
      .tools {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Photo Tools</h1>
    <p class="description">使用する機能を選択してください。</p>

    <div class="tools">
      <a class="tool" href="./frame/">
        <h2>写真にフチを付ける</h2>
        <p>写真の外側に余白を追加し、PNGまたはJPEGで保存します。</p>
      </a>

      <a class="tool" href="./collage/">
        <h2>4枚の組み写真</h2>
        <p>4枚の写真を2×2に配置して、1枚の画像に書き出します。</p>
      </a>
    </div>
  </main>
</body>
</html>
