<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tools</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#111;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,
      "Hiragino Sans","Yu Gothic UI",sans-serif;
      padding:24px;
    }

    main{
      width:min(900px,100%);
    }

    h1{
      margin:0;
      font-size:36px;
    }

    .description{
      margin:12px 0 32px;
      color:#aaa;
      line-height:1.7;
    }

    .tools{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .tool{
      display:block;
      padding:28px;
      border-radius:22px;
      text-decoration:none;
      color:white;
      background:#1d1d20;
      border:1px solid #333;
      transition:.2s;
    }

    .tool:hover{
      transform:translateY(-4px);
      background:#27272c;
    }

    .tool h2{
      margin:0 0 12px;
    }

    .tool p{
      margin:0;
      color:#aaa;
      line-height:1.7;
    }
  </style>
</head>

<body>

<main>

<h1>Photo Tools</h1>

<p class="description">
写真編集ツールを選択してください。
</p>

<div class="tools">

<a class="tool" href="./frame/">
<h2>🖼 写真にフチを付ける</h2>

<p>
余白を追加してInstagram風の写真を作成します。
PNG・JPEGに対応。
</p>
</a>

<a class="tool" href="./college/">
<h2>📷 4枚組み写真</h2>

<p>
4枚の写真を2×2に並べて、
1枚の画像として保存できます。
</p>
</a>

</div>

</main>

</body>
</html>
